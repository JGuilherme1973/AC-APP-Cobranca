<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 55">
  <!-- Fundo navy -->
  <rect width="60" height="55" rx="6" fill="#0E1B2A"/>
  <!-- Barra horizontal superior -->
  <line x1="7" y1="7" x2="53" y2="7" stroke="#B79A5A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- V externo ouro -->
  <polyline points="7,7 30,48 53,7" fill="none" stroke="#B79A5A" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- V interno paralelo -->
  <polyline points="14,7 30,42 46,7" fill="none" stroke="#B79A5A" stroke-width="1.3"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Losango acento bordô -->
  <polygon points="30,45 33,48 30,51 27,48" fill="#5A1220"/>
</svg>
